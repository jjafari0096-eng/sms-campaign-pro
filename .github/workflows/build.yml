name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission to gradlew
      run: chmod +x gradlew

    - name: Build Android App APK
      run: ./gradlew clean :app:assembleDebug --stacktrace

    - name: Verify and locate APK
      run: |
        find . -type f -name "*.apk"
        APK_COUNT=$(find . -type f -name "*.apk" | wc -l)
        if [ "$APK_COUNT" -eq 0 ]; then
          echo "❌ No APK files found! Build failed to generate output."
          ls -laR app/ 2>/dev/null || echo "app/ directory doesn't exist"
          exit 1
        fi
        echo "✅ Found $APK_COUNT APK file(s)"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error