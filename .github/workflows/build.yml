name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Create debug keystore if no release keystore is provided
      run: |
        if [ -z "${{ secrets.KEYSTORE_FILE }}" ]; then
          echo "No release keystore found, creating debug keystore for CI build"
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          export KEYSTORE_FILE="debug.keystore"
          export KEYSTORE_PASSWORD="android"
          export KEY_ALIAS="androiddebugkey"
          export KEY_PASSWORD="android"
        fi
      
    - name: Build release APK and AAB
      run: ./gradlew clean assembleRelease bundleRelease --stacktrace --info
      env:
        KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE || 'debug.keystore' }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
      
    - name: Find all generated artifacts (APK + AAB)
      run: |
        echo "=== Found APK files ==="
        find . -type f -name "*.apk" -exec ls -la {} \;
        echo -e "\n=== Found AAB files ==="
        find . -type f -name "*.aab" -exec ls -la {} \;
      
    - name: Upload all release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sms-campaign-pro-release-artifacts
        path: |
          **/*.apk
          **/*.aab
        retention-days: 90