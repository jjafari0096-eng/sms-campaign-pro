name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: List project structure before build
      run: |
        echo "=== Project root files ==="
        ls -la
        echo -e "\n=== Gradle wrapper exists? ==="
        ls -la gradlew
        echo -e "\n=== All modules ==="
        ls -la */
        
    - name: Build debug APK (explicit app module)
      run: ./gradlew clean :app:assembleDebug --stacktrace --info
      
    - name: Find all APK files and verify build output
      run: |
        echo "=== Searching for all APK files in project ==="
        find . -type f -name "*.apk" -print0 | xargs -0 ls -la
        echo -e "\n=== Complete build directory structure ==="
        if [ -d "app/build" ]; then
          ls -laR app/build
        else
          echo "❌ app/build directory does NOT exist!"
          exit 1
        fi
      
    - name: Upload all APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sms-campaign-pro-apks
        path: "**/*.apk"
        retention-days: 30
        if-no-files-found: error